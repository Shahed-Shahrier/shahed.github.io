<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Circuit Weaver Logo</title>
  <desc id="desc">Modern logo for Circuit Weaver with circuit traces and waveform.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1080" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1324"/>
      <stop offset="1" stop-color="#162B4B"/>
    </linearGradient>
    <linearGradient id="trace" x1="250" y1="170" x2="920" y2="530" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3EA0FF"/>
      <stop offset="1" stop-color="#22D3A6"/>
    </linearGradient>
    <linearGradient id="pulse" x1="350" y1="350" x2="860" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8AB6FF"/>
      <stop offset="1" stop-color="#6EFACC"/>
    </linearGradient>
  </defs>

  <rect x="40" y="40" width="1120" height="620" rx="44" fill="url(#bg)"/>
  <rect x="90" y="90" width="1020" height="520" rx="30" fill="#0F1D34" fill-opacity="0.72" stroke="#3EA0FF" stroke-opacity="0.28" stroke-width="2"/>

  <path d="M280 230H460L520 290H690L760 220H930" stroke="url(#trace)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M280 470H430L510 390H700L785 470H930" stroke="url(#trace)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>

  <circle cx="280" cy="230" r="17" fill="#8AB6FF"/>
  <circle cx="930" cy="220" r="17" fill="#6EFACC"/>
  <circle cx="280" cy="470" r="17" fill="#8AB6FF"/>
  <circle cx="930" cy="470" r="17" fill="#6EFACC"/>

  <path d="M370 350H470L525 300L595 410L660 300L735 410L810 350H860" stroke="url(#pulse)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="160" y="590" fill="#EAF4FF" font-family="Space Grotesk, Segoe UI, Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="1.5">CIRCUIT WEAVER</text>
  <text x="162" y="630" fill="#8EB8D8" font-family="JetBrains Mono, Consolas, monospace" font-size="24" letter-spacing="2.5">DC   TRANSIENT   AC SWEEP</text>
</svg>
